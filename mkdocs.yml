site_name: FAIR Maturity Matrix
site_description: FAIR Maturity Matrix documentation
docs_dir: docs
theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - navigation.tabs
    - navigation.tabs.sticky
plugins:
  - search
  - minify:
      minify_html: true
  - graph
  - macros:
      on_error_fail: true
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - stylesheets/dama-context.css
extra:
  consent:
    title: Cookie consent
    descriptiopn: >- 
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  generator: false
repo_url: https://github.com/chris-day/FAIR-Maturity-Matrix
repo_name: chris-day/FAIR-Maturity-Matrix
copyright: Copyright &copy; Pistoia Alliance Inc
